name: Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/*
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Get package name and version
        id: crate_metadata
        run: |
          NAME=$(cargo metadata --no-deps --format-version=1| jq -r '.packages[0].name')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          VERSION=$(cargo metadata --no-deps --format-version=1| jq -r '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run clippy
        run: cargo clippy --target=x86_64-unknown-linux-gnu -- -D warnings

      - name: Run tests
        run: cargo test --target=x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --target=x86_64-unknown-linux-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.crate_metadata.outputs.name }}-${{ steps.crate_metadata.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
          path: target/x86_64-unknown-linux-gnu/release/${{ steps.crate_metadata.outputs.name }}
